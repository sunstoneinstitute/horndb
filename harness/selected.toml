[suites.rdf12-n-triples]
# W3C RDF 1.2 N-Triples *syntax* tests. Manifest source:
# https://w3c.github.io/rdf-tests/rdf/rdf12/rdf-n-triples/syntax/manifest.ttl
# Re-fetch via `crates/harness/scripts/fetch-w3c-suites.sh`.
#
# The 4 positive cases exercise `<<( s p o )>>` triple-term objects
# (incl. a nested-triple form). The 6 negative cases exercise the
# bad-syntax positions our N-Triples loader must reject (triple-term
# in predicate or subject position, with literal/bnode subterms).
#
# The upstream filenames have a `-syntax-` infix that the TASKS.md
# inventory dropped: `ntriples12-01..03` map to
# `ntriples12-syntax-01..03.nt`, and `ntriples12-bad-01..10` to
# `ntriples12-bad-syntax-01..10.nt`. The IDs below are the manifest
# entry IRIs (which keep the inventory shape) — the harness resolves
# the on-disk filenames via the manifest's `mf:action` triple.
manifest = "crates/harness/tests/fixtures/rdf12-n-triples/manifest.ttl"
include = [
    # Positive: triple-term as object.
    "#ntriples12-01",
    "#ntriples12-02",
    "#ntriples12-03",
    "#ntriples12-nested-1",
    # Negative: triple-term in disallowed positions / disallowed subterms.
    "#ntriples12-bad-01",
    "#ntriples12-bad-05",
    "#ntriples12-bad-06",
    "#ntriples12-bad-07",
    "#ntriples12-bad-08",
    "#ntriples12-bad-10",
]

# SPEC-07 Stage-1 SPARQL query subset.
#
# These fixtures live outside the W3C manifest model used by `[suites.*]`:
# each entry names a directory under
# `crates/harness/tests/fixtures/sparql11/<path>` containing
# `query.rq`, `data.nt`, `expected.srj`, and `form`. They are consumed
# directly by `crates/sparql/tests/w3c_suite.rs`, not by the harness
# binary's manifest-driven runner. SPEC-01 will subsume this section
# into a uniform suite model once the SPARQL engine widens.
[sparql_query]
tests = [
    "selected_subset/basic-001",
    "selected_subset/basic-002",
    "selected_subset/basic-003",
    "selected_subset/basic-004",
    "selected_subset/basic-005",
    "selected_subset/expr-001",
    "selected_subset/expr-002",
    # Non-recursive property paths (SPEC-07 #49).
    "selected_subset/path-alt-001",
    "selected_subset/path-neg-001",
    "selected_subset/path-opt-001",
]
