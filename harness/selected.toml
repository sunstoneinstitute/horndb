# SPEC-01 F11 — versioned manifest of which test IDs the harness expects
# to pass right now. CI runs ONLY what is listed here. Adding tests
# is a normal PR change; removing tests requires an entry in [[removed]]
# with a tracking issue URL.
#
# Stage-0 selection: one trivial test per suite, sufficient to prove
# that the harness flags the stub engine red when it should and green
# when it should. As Stage-1 work lands, the OWL 2 suite grows to >=50
# real W3C cases (see plans/2026-05-24-SPEC-01-conformance-harness.md
# Stage 1).
#
# IDs are suffix-matched against the manifest entry IRI so the same
# selection survives any workspace root path (worktrees, CI checkouts).

version = 1

[suites.owl2]
manifest = "crates/harness/tests/fixtures/owl2/manifest.ttl"
include = [
    # Stub passes this (empty graph entails empty graph).
    "#trivial-entail-true",
    # Stub fails this -- included on purpose so CI proves red-on-failure.
    "#subclass-entail",
    # Stub passes this (recognises explicit owl:Nothing membership).
    "#inconsistent-001",
]

[suites.sparql11]
manifest = "crates/harness/tests/fixtures/sparql11/manifest.ttl"
include = [
    "#ask-true",
]

# SPEC-07 Stage-1 SPARQL query subset.
#
# These fixtures live outside the W3C manifest model used by `[suites.*]`:
# each entry names a directory under
# `crates/harness/tests/fixtures/sparql11/<path>` containing
# `query.rq`, `data.nt`, `expected.srj`, and `form`. They are consumed
# directly by `crates/sparql/tests/w3c_suite.rs`, not by the harness
# binary's manifest-driven runner. SPEC-01 will subsume this section
# into a uniform suite model once the SPARQL engine widens.
[sparql_query]
tests = [
    "selected_subset/basic-001",
    "selected_subset/basic-002",
    "selected_subset/basic-003",
    "selected_subset/basic-004",
    "selected_subset/basic-005",
]
