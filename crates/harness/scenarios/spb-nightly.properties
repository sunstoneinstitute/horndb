# LDBC SPB nightly scenario — aggregation-only query-throughput run.
#
# This is the checked-in source of truth for the `nightly` workflow's
# SPB run. The workflow copies it into the prepared SPB assets tree (the
# Ant `dist/` directory) before invoking the driver, because the relative
# path keys below (ontologiesPath, queriesPath, definitionsPath, …) are
# resolved by the driver against the scenario file's own directory.
#
# Phases: everything that loads or generates data is OFF — the store is
# pre-loaded out-of-band (HornDB: `serve` loads the materialized closure;
# GraphDB: the repo is bulk-loaded with the same flat N-Triples). Only
# `runBenchmark=true` is on, and only aggregation agents run, so this
# measures pure SPARQL query throughput, identical corpus on both engines.
#
# `editorialAgents=0` for now: editorial (CW insert/update/delete) agents
# and the full SF=0.256 (256M-triple) dataset are the tracked follow-up
# (TASKS.md). Until then the headline metric is `aggregation-qps`.
#
# `endpointURL` / `endpointUpdateURL` / `benchmarkRunPeriodSeconds` are
# overridden by the harness shim (`--endpoint` / `--endpoint-update` /
# `--duration`); the values here are only sane standalone defaults.

#Benchmark Threads Configuration
aggregationAgents=4
editorialAgents=0
dataGeneratorWorkers=4

#Benchmark Configuration Parameters
warmupPeriodSeconds=5
benchmarkRunPeriodSeconds=600
datasetSize=18644617
generatedTriplesPerFile=50000
queryTimeoutSeconds=60
querySubstitutionParameters=1000
benchmarkByQueryMixRuns=0
minUpdateRateThresholdOps=0.0
minUpdateRateThresholdReachTimePercent=0
maxUpdateRateThresholdOps=0.0
endpointURL=http://127.0.0.1:3840/query
endpointUpdateURL=http://127.0.0.1:3840/update
ontologiesPath=./data/ontologies
referenceDatasetsPath=./data/datasets
creativeWorksPath=./generated
queriesPath=./data/sparql
validationPath=./data/validation
definitionsPath=./definitions.properties
scriptsPath=./data/scripts
enableCompressionOnGeneratedData=false
creativeWorksInfo=dataset.info
generateCreativeWorksFormat=n-quads
currentRateReportPeriodSeconds=0
saveDetailedQueryLogs=true
verbose=true

#Benchmark Operational Phases
loadOntologies=false
loadReferenceDatasets=false
generateCreativeWorks=false
loadCreativeWorks=false
generateQuerySubstitutionParameters=false
validateQueryResults=false
warmUp=true
runBenchmark=true
runBenchmarkOnlineReplicationAndBackup=false
checkConformance=false
