name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy
          cache: true

      # The vendored GraphBLAS now builds into crates/closure/vendor/.shared-build/,
      # which lives outside target/ and so is NOT covered by rust-cache above.
      # Cache it explicitly, keyed on the submodule SHA so it invalidates exactly
      # when the GraphBLAS pin moves — otherwise CI recompiles GraphBLAS every run.
      - name: resolve GraphBLAS submodule sha + build target
        id: graphblas
        run: |
          echo "sha=$(git -C crates/closure/vendor/GraphBLAS rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "triple=$(rustc -vV | awk '/^host:/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: cache vendored GraphBLAS build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: crates/closure/vendor/.shared-build
          # Key on the exact Rust target triple build.rs keys the dir on (subsumes
          # CPU arch + OS/ABI) so a restored cache always matches the build layout.
          key: graphblas-${{ steps.graphblas.outputs.triple }}-${{ steps.graphblas.outputs.sha }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --workspace

      - name: sparql tests (server feature)
        run: cargo test -p horndb-sparql --features server

      - name: build harness binary
        run: cargo build -p horndb-harness --bin harness --release

      - name: conformance — Stage-1 selected subset (real engine)
        run: |
          cargo build -p horndb-harness --bin harness --release --features real-engine
          ./target/release/harness \
            --engine owlrl \
            run \
            --junit target/junit.xml

      - name: upload junit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: junit-${{ github.run_id }}
          path: target/junit.xml

      - name: publish test report
        if: always()
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4.3.1
        with:
          report_paths: target/junit.xml
          include_passed: true
          fail_on_failure: true
