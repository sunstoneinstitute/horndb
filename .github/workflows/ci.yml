name: ci

on:
  pull_request:
    # `labeled` is included so that applying `can-be-tested` to a PR from a
    # non-owner re-triggers CI (the gate job below re-evaluates and lets it
    # through). opened/synchronize/reopened are the normal build triggers.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

# One CI pipeline per ref. A new push to a PR cancels the superseded run —
# stale runs waste runners and flood the repo's 10 GB Actions cache quota,
# which evicts the caches the next run needs. Pushes to main never cancel a
# running validation (cancel-in-progress is false there); GitHub keeps at most
# one extra main run queued, so a merge burst folds into the newest run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether this event may consume CI. Pushes to main are always trusted
  # (already-merged code). A pull request builds only when its author is a code
  # owner or a trusted collaborator has applied the `can-be-tested` label —
  # otherwise the build jobs are skipped. This keeps fork / drive-by PRs from
  # auto-running the workspace build until a maintainer opts them in. Note:
  # applying labels needs Triage+ on the repo, so a PR author cannot
  # self-authorise by labelling their own PR.
  #
  # Docs-only PRs also skip the build: a diff that touches only markdown and
  # docs/ cannot change what the build jobs verify. GitHub treats jobs skipped
  # via `if:` as satisfied for branch-protection required checks, so a skipped
  # build does not block merging. The `can-be-tested` label overrides the
  # docs-only skip — a maintainer can apply it to force a full build.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Decide whether to build
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Non-PR events (push to main) are trusted — always build.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Event ${{ github.event_name }} is trusted — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A trusted collaborator applied the opt-in label. This both
          # authorises an untrusted author AND forces a build on a docs-only
          # PR, so it is checked before the docs-only skip.
          if ${{ contains(github.event.pull_request.labels.*.name, 'can-be-tested') }}; then
            echo "PR carries the 'can-be-tested' label — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Docs-only skip: if every changed file is markdown or under docs/,
          # there is nothing for the build jobs to verify. On an API failure
          # CHANGED comes back empty and we fall through to the trust checks —
          # failing open towards building, never towards a wrong skip.
          CHANGED=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/$PR_NUMBER/files?per_page=100" \
            --jq '.[].filename' 2>/dev/null || true)
          if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qvE '(^docs/|\.md$)'; then
            echo "::notice::PR touches only docs/ and markdown files — skipping the build. Apply the 'can-be-tested' label to force a full build."
            echo "build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PR author is a code owner. Read CODEOWNERS from the BASE commit
          # (trusted) via the API — never the PR's own copy, which the author
          # could edit to add themselves. Only simple `@user` owners are
          # recognised (HornDB uses `* @stigsb`); `@org/team` owners would need
          # a membership lookup and are intentionally not resolved here.
          OWNERS=$(gh api \
            "repos/${{ github.repository }}/contents/.github/CODEOWNERS?ref=$BASE_SHA" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null \
            | sed 's/#.*//' | grep -oE '@[A-Za-z0-9-]+' | tr -d '@' | sort -u || true)
          echo "Code owners: $(echo "$OWNERS" | tr '\n' ' ')"
          if [ -n "$OWNERS" ] && echo "$OWNERS" | grep -qx "$AUTHOR"; then
            echo "Author $AUTHOR is a code owner — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Author '$AUTHOR' is not a code owner and the PR lacks the 'can-be-tested' label — skipping the build. A maintainer can add that label to authorise CI."
          echo "build=false" >> "$GITHUB_OUTPUT"

  # fmt + clippy in their own job so linting runs in PARALLEL with the test and
  # conformance jobs instead of serially in front of them. Clippy still runs
  # every build script (the vendored GraphBLAS and oxrocksdb-sys C/C++ builds
  # included), so this job needs the submodules and the GraphBLAS cache; all
  # build jobs share the same GraphBLAS cache key, and rust-cache keys per job
  # so their cargo caches don't clobber each other.
  #
  # cache-save-if: only runs on main save the cargo cache. PR runs restore
  # main's cache but never write their own per-ref copies — per-PR saves
  # (~1.3 GB each) were blowing the repo's 10 GB cache quota within the hour,
  # evicting everything and leaving every run to compile from cold.
  lint:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy
          cache: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: resolve GraphBLAS submodule sha + build target
        id: graphblas
        run: |
          echo "sha=$(git -C crates/closure/vendor/GraphBLAS rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "triple=$(rustc -vV | awk '/^host:/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: cache vendored GraphBLAS build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/closure/vendor/.shared-build
          key: graphblas-${{ steps.graphblas.outputs.triple }}-${{ steps.graphblas.outputs.sha }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: ml clippy (server feature)
        run: cargo clippy -p horndb-ml --all-targets --features server -- -D warnings

  # Unit + integration tests. Compiled with RUSTFLAGS=-D warnings, so plain
  # rustc warnings still fail this job even though clippy lives in `lint`
  # above. The conformance harness build lives in its own `conformance` job so
  # the two compile pipelines (debug tests here, release-ish harness there)
  # run in parallel instead of back-to-back on one runner.
  tests:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          cache: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      # cargo-nextest runs the workspace's ~90 integration-test binaries in one
      # concurrently-scheduled pool instead of cargo's serial-per-binary default
      # (task #108). install-action fetches a prebuilt binary, so the rustc-1.90
      # pin does not constrain the nextest version (that limit is for building
      # nextest from source, not running it).
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest

      # The vendored GraphBLAS builds into crates/closure/vendor/.shared-build/,
      # which lives outside target/ and so is NOT covered by rust-cache above.
      # Cache it explicitly, keyed on the submodule SHA so it invalidates exactly
      # when the GraphBLAS pin moves — otherwise CI recompiles GraphBLAS every run.
      - name: resolve GraphBLAS submodule sha + build target
        id: graphblas
        run: |
          echo "sha=$(git -C crates/closure/vendor/GraphBLAS rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "triple=$(rustc -vV | awk '/^host:/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: cache vendored GraphBLAS build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/closure/vendor/.shared-build
          # Key on the exact Rust target triple build.rs keys the dir on (subsumes
          # CPU arch + OS/ABI) so a restored cache always matches the build layout.
          key: graphblas-${{ steps.graphblas.outputs.triple }}-${{ steps.graphblas.outputs.sha }}

      - name: unit + integration tests
        run: cargo nextest run --profile ci --workspace

      - name: sparql tests (server feature)
        run: cargo nextest run --profile ci -p horndb-sparql --features server

      - name: ml tests (server feature)
        run: cargo nextest run --profile ci -p horndb-ml --features server

      # nextest does not run doctests; run them separately so doctest coverage
      # can never silently regress (currently zero runnable doctests, fast).
      - name: doctests
        run: cargo test --workspace --doc

  # Conformance run with the real engine, in its own job so its optimized
  # harness build compiles in parallel with the debug build in `tests` instead
  # of after it. The harness is built ONCE, directly with --features
  # real-engine: the featureless configuration is already compile-checked by
  # `cargo clippy --workspace --all-targets` in the lint job, so a second
  # featureless release build adds no coverage. The `conformance` cargo
  # profile (root Cargo.toml) is release-like but with cheap optimization —
  # the conformance subset runs in seconds, so it does not need -O3 across the
  # ~500-crate dependency tree.
  conformance:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          cache: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: resolve GraphBLAS submodule sha + build target
        id: graphblas
        run: |
          echo "sha=$(git -C crates/closure/vendor/GraphBLAS rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "triple=$(rustc -vV | awk '/^host:/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: cache vendored GraphBLAS build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/closure/vendor/.shared-build
          key: graphblas-${{ steps.graphblas.outputs.triple }}-${{ steps.graphblas.outputs.sha }}

      - name: build harness binary (real engine)
        run: cargo build -p horndb-harness --bin harness --profile conformance --features real-engine

      - name: conformance — Stage-1 selected subset (real engine)
        run: |
          ./target/conformance/harness \
            --engine owlrl \
            run \
            --junit target/junit.xml

      - name: upload junit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-${{ github.run_id }}
          path: target/junit.xml

      - name: publish test report
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: target/junit.xml
          include_passed: true
          fail_on_failure: true

  # SPEC-10 rdflib-compat differential suite. Kept in a SEPARATE job so the main
  # hermetic lint/tests/conformance jobs above never need a Python interpreter:
  # the `horndb-python` binding crate is excluded from the Cargo workspace, so
  # `cargo build/clippy/test --workspace` stay Python-free. This job builds the
  # wheel with maturin and runs the pytest suite against upstream rdflib
  # (SPEC-10 acceptance #1, #2, #6, #7 — Linux target).
  python-rdflib-compat:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          cache: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: install maturin + test deps
        run: pip install "maturin>=1.7,<2.0" "rdflib>=7.0" pytest

      - name: build + install the extension module
        working-directory: crates/python
        run: maturin build --features extension-module --out dist && pip install dist/*.whl

      - name: rdflib-compat differential tests
        working-directory: crates/python
        run: python -m pytest tests/ -q
