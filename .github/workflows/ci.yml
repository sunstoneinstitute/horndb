name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  # SuiteSparse:GraphBLAS version probed by horndb-closure's build.rs.
  # Ubuntu apt only ships older releases, so we build from source and
  # cache the install tree across CI runs.
  GRAPHBLAS_VERSION: "9.4.5"
  GRAPHBLAS_PREFIX: ${{ github.workspace }}/.graphblas-install

jobs:
  lint-test-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: cache GraphBLAS install
        id: cache-graphblas
        uses: actions/cache@v4
        with:
          path: ${{ env.GRAPHBLAS_PREFIX }}
          key: graphblas-${{ env.GRAPHBLAS_VERSION }}-${{ runner.os }}-v1

      - name: build GraphBLAS from source
        if: steps.cache-graphblas.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          tmp=$(mktemp -d)
          cd "$tmp"
          curl -fsSL "https://github.com/DrTimothyAldenDavis/GraphBLAS/archive/refs/tags/v${GRAPHBLAS_VERSION}.tar.gz" -o gb.tar.gz
          tar xzf gb.tar.gz
          cd "GraphBLAS-${GRAPHBLAS_VERSION}"
          cmake -S . -B build \
            -DCMAKE_INSTALL_PREFIX="${GRAPHBLAS_PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DGRAPHBLAS_BUILD_STATIC_LIBS=OFF \
            -DGRAPHBLAS_USE_JIT=OFF
          cmake --build build --parallel "$(nproc)"
          cmake --install build

      - name: export GraphBLAS to environment
        run: |
          echo "PKG_CONFIG_PATH=${GRAPHBLAS_PREFIX}/lib/pkgconfig:${GRAPHBLAS_PREFIX}/lib/x86_64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${GRAPHBLAS_PREFIX}/lib:${GRAPHBLAS_PREFIX}/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy
          cache: true

      - name: verify GraphBLAS is discoverable
        run: |
          pkg-config --atleast-version=8.0 GraphBLAS
          pkg-config --modversion GraphBLAS

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --workspace

      - name: sparql tests (server feature)
        run: cargo test -p horndb-sparql --features server

      - name: build harness binary
        run: cargo build -p horndb-harness --bin harness --release

      - name: conformance — Stage-1 selected subset (real engine)
        run: |
          cargo build -p horndb-harness --bin harness --release --features real-engine
          ./target/release/harness \
            --engine owlrl \
            run \
            --junit target/junit.xml

      - name: upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.run_id }}
          path: target/junit.xml

      - name: publish test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: target/junit.xml
          include_passed: true
          fail_on_failure: true
