name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy
          cache: true

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --workspace

      - name: build harness binary
        run: cargo build -p reasoner-harness --bin harness --release

      - name: conformance — Stage-1 selected subset (real engine)
        run: |
          cargo build -p reasoner-harness --bin harness --release --features real-engine
          ./target/release/harness \
            --engine owlrl \
            run \
            --junit target/junit.xml

      - name: upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.run_id }}
          path: target/junit.xml

      - name: publish test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: target/junit.xml
          include_passed: true
          fail_on_failure: true
