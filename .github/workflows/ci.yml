name: ci

on:
  pull_request:
    # `labeled` is included so that applying `can-be-tested` to a PR from a
    # non-owner re-triggers CI (the gate job below re-evaluates and lets it
    # through). opened/synchronize/reopened are the normal build triggers.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

jobs:
  # Decide whether this event may consume CI. Pushes to main are always trusted
  # (already-merged code). A pull request builds only when its author is a code
  # owner or a trusted collaborator has applied the `can-be-tested` label —
  # otherwise the build jobs are skipped. This keeps fork / drive-by PRs from
  # auto-running the workspace build until a maintainer opts them in. Note:
  # applying labels needs Triage+ on the repo, so a PR author cannot
  # self-authorise by labelling their own PR.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Decide whether to build
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # Non-PR events (push to main) are trusted — always build.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Event ${{ github.event_name }} is trusted — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A trusted collaborator applied the opt-in label.
          if ${{ contains(github.event.pull_request.labels.*.name, 'can-be-tested') }}; then
            echo "PR carries the 'can-be-tested' label — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PR author is a code owner. Read CODEOWNERS from the BASE commit
          # (trusted) via the API — never the PR's own copy, which the author
          # could edit to add themselves. Only simple `@user` owners are
          # recognised (HornDB uses `* @stigsb`); `@org/team` owners would need
          # a membership lookup and are intentionally not resolved here.
          OWNERS=$(gh api \
            "repos/${{ github.repository }}/contents/.github/CODEOWNERS?ref=$BASE_SHA" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null \
            | sed 's/#.*//' | grep -oE '@[A-Za-z0-9-]+' | tr -d '@' | sort -u || true)
          echo "Code owners: $(echo "$OWNERS" | tr '\n' ' ')"
          if [ -n "$OWNERS" ] && echo "$OWNERS" | grep -qx "$AUTHOR"; then
            echo "Author $AUTHOR is a code owner — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Author '$AUTHOR' is not a code owner and the PR lacks the 'can-be-tested' label — skipping the build. A maintainer can add that label to authorise CI."
          echo "build=false" >> "$GITHUB_OUTPUT"

  lint-test-conformance:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy
          cache: true

      # cargo-nextest runs the workspace's ~90 integration-test binaries in one
      # concurrently-scheduled pool instead of cargo's serial-per-binary default
      # (task #108). install-action fetches a prebuilt binary, so the rustc-1.90
      # pin does not constrain the nextest version (that limit is for building
      # nextest from source, not running it).
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      # The vendored GraphBLAS now builds into crates/closure/vendor/.shared-build/,
      # which lives outside target/ and so is NOT covered by rust-cache above.
      # Cache it explicitly, keyed on the submodule SHA so it invalidates exactly
      # when the GraphBLAS pin moves — otherwise CI recompiles GraphBLAS every run.
      - name: resolve GraphBLAS submodule sha + build target
        id: graphblas
        run: |
          echo "sha=$(git -C crates/closure/vendor/GraphBLAS rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "triple=$(rustc -vV | awk '/^host:/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: cache vendored GraphBLAS build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/closure/vendor/.shared-build
          # Key on the exact Rust target triple build.rs keys the dir on (subsumes
          # CPU arch + OS/ABI) so a restored cache always matches the build layout.
          key: graphblas-${{ steps.graphblas.outputs.triple }}-${{ steps.graphblas.outputs.sha }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit + integration tests
        run: cargo nextest run --profile ci --workspace

      - name: sparql tests (server feature)
        run: cargo nextest run --profile ci -p horndb-sparql --features server

      - name: ml tests (server feature)
        run: cargo nextest run --profile ci -p horndb-ml --features server

      # nextest does not run doctests; run them separately so doctest coverage
      # can never silently regress (currently zero runnable doctests, fast).
      - name: doctests
        run: cargo test --workspace --doc

      - name: ml clippy (server feature)
        run: cargo clippy -p horndb-ml --all-targets --features server -- -D warnings

      - name: build harness binary
        run: cargo build -p horndb-harness --bin harness --release

      - name: conformance — Stage-1 selected subset (real engine)
        run: |
          cargo build -p horndb-harness --bin harness --release --features real-engine
          ./target/release/harness \
            --engine owlrl \
            run \
            --junit target/junit.xml

      - name: upload junit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-${{ github.run_id }}
          path: target/junit.xml

      - name: publish test report
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: target/junit.xml
          include_passed: true
          fail_on_failure: true

  # SPEC-10 rdflib-compat differential suite. Kept in a SEPARATE job so the main
  # hermetic lint-test-conformance job above never needs a Python interpreter:
  # the `horndb-python` binding crate is excluded from the Cargo workspace, so
  # `cargo build/clippy/test --workspace` stay Python-free. This job builds the
  # wheel with maturin and runs the pytest suite against upstream rdflib
  # (SPEC-10 acceptance #1, #2, #6, #7 — Linux target).
  python-rdflib-compat:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          cache: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: install maturin + test deps
        run: pip install "maturin>=1.7,<2.0" "rdflib>=7.0" pytest

      - name: build + install the extension module
        working-directory: crates/python
        run: maturin build --features extension-module --out dist && pip install dist/*.whl

      - name: rdflib-compat differential tests
        working-directory: crates/python
        run: python -m pytest tests/ -q
