name: nightly

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

# Stable, persisted SPB asset tree on the hornbench runner, OUTSIDE the
# ephemeral Actions checkout. Prepared once (see TASKS.md). Holds:
#   - the built LDBC SPB driver JAR,
#   - spb-256.nt: the flat materialized closure both engines serve,
#   - the queries + substitution params the scenario's relative paths
#     resolve against (the Ant `dist/` tree).
# The runner executes as user `bench`, so the job can read these paths.
env:
  SPB_ASSETS: /home/bench/src/horndb/crates/harness/data/ldbc-spb/dist
  # Cumulative trend DB on the runner's persistent disk, OUTSIDE the
  # ephemeral Actions checkout (which `git clean -ffdx` wipes each run).
  # All harness invocations below — the engine legs and the
  # report — read $HARNESS_DB by default, so each nightly appends its rows
  # to the accumulated series instead of starting from an empty DB. A prune
  # step below keeps a 90-day rolling window, so the uploaded artifact is
  # the retained history, not a single run's points.
  HARNESS_DB: /home/bench/horndb-bench/harness.sqlite
  # Cargo registry/git + build artifacts on the same persistent disk, so
  # repeat nightly runs reuse prior downloads/compiles without going through
  # the GitHub-hosted Actions cache (that's a network round trip to shared
  # storage for data that's already sitting on this dedicated machine, and it
  # would draw against the same 10 GB repo cache quota ci.yml relies on).
  # setup-rust-toolchain's own `cache: true`/rust-cache is left off below.
  CARGO_HOME: /home/bench/horndb-bench/cache/cargo-home
  CARGO_TARGET_DIR: /home/bench/horndb-bench/cache/target
  HORNDB_BIND: 127.0.0.1:3840
  # Pin the GraphDB A/B reference version to the branch, not whatever is
  # installed on the runner. start-graphdb-free.sh downloads this version if
  # the runner does not already have it unpacked.
  GRAPHDB_VERSION: "10.8.14"
  # Third + fourth A/B legs: Oxigraph (Rust SPARQL store, no reasoner)
  # serving the same flat closure as HornDB/GraphDB — once from the store
  # as bulk-loaded, once from an `oxigraph optimize`d copy, recorded as
  # separate trend series (`oxigraph` / `oxigraph-optimized`). Pinned to the
  # branch, not the runner; start-oxigraph.sh downloads this release binary
  # if absent (cached). The heavy one-time load of both persisted stores is
  # a runner precondition — see bootstrap-oxigraph-spb.sh.
  OXIGRAPH_VERSION: "0.5.9"
  OXIGRAPH_BIND: "127.0.0.1:7878"

jobs:
  spb-256:
    # Dedicated benchmark machine (self-hosted). Labels match what ops
    # configured on hornbench (gh_runner_labels in hetzner-infra).
    runs-on: [self-hosted, bench, zen4]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.90.0"
          # No rust-cache: CARGO_HOME/CARGO_TARGET_DIR above already point at
          # persistent local disk, which does the same job without the
          # GitHub-hosted cache round trip or its shared quota.
          cache: false

      - name: build harness
        run: cargo build -p horndb-harness --bin harness --release --features real-engine

      - name: stage nightly scenario into asset tree
        # The driver resolves the scenario's relative path keys against the
        # scenario file's own directory, so the checked-in template must
        # live alongside the prepared assets.
        run: cp crates/harness/scenarios/spb-nightly.properties "$SPB_ASSETS/spb-nightly.properties"

      - name: start HornDB engine
        # Per-run bring-up: serve the prepared flat closure (no reasoning),
        # wait until the query endpoint answers, then run the driver.
        run: |
          set -euo pipefail
          DATASET="$SPB_ASSETS/spb-256.nt"
          test -f "$DATASET" || { echo "::error::SPB dataset missing at $DATASET — prepare it on hornbench (see TASKS.md)"; exit 1; }
          DATA_FILES="$DATASET" RELEASE=1 BIND="$HORNDB_BIND" \
            ./crates/harness/scripts/start-engine.sh > /tmp/horndb-engine.log 2>&1 &
          echo $! > /tmp/horndb-engine.pid
          if ! ./crates/harness/scripts/wait-for-sparql.sh "http://$HORNDB_BIND/query" 180; then
            echo "::error::HornDB engine did not become ready in 180s"; cat /tmp/horndb-engine.log; exit 1
          fi

      - name: SPB-256 against HornDB
        env:
          SPB_DRIVER_JAR: ${{ env.SPB_ASSETS }}/semantic_publishing_benchmark-basic-standard.jar
          SPB_SCENARIO: ${{ env.SPB_ASSETS }}/spb-nightly.properties
          HORNDB_ENDPOINT: http://${{ env.HORNDB_BIND }}/query
          HORNDB_UPDATE_ENDPOINT: http://${{ env.HORNDB_BIND }}/update
        run: ./crates/harness/scripts/run-spb-256.sh

      - name: stop HornDB engine
        if: always()
        # start-engine.sh `exec`s the serve binary, so the recorded PID is
        # the server itself — a precise kill is enough, and is safer than a
        # broad `pkill -f serve` on the shared bench runner.
        run: |
          if [ -f /tmp/horndb-engine.pid ]; then
            kill "$(cat /tmp/horndb-engine.pid)" 2>/dev/null || true
          fi

      - name: start GraphDB engine
        id: start_graphdb
        # Per-run bring-up, mirroring the HornDB leg above: bring the
        # branch-pinned GraphDB version up, holding the same closure in a
        # read-only `spb` repo (loaded once by bootstrap-graphdb-free-spb.sh),
        # then run the driver. Running GraphDB only for its own leg keeps it
        # from competing with HornDB for RAM / OS page cache during the HornDB
        # measurement. continue-on-error preserves the prior contract: a
        # GraphDB problem skips the A/B leg rather than failing the nightly.
        continue-on-error: true
        run: ./crates/harness/scripts/start-graphdb-free.sh

      - name: SPB-256 against GraphDB Free
        if: steps.start_graphdb.outcome == 'success'
        env:
          SPB_DRIVER_JAR: ${{ env.SPB_ASSETS }}/semantic_publishing_benchmark-basic-standard.jar
          SPB_SCENARIO: ${{ env.SPB_ASSETS }}/spb-nightly.properties
        run: |
          set -euo pipefail
          # The process is up (start_graphdb succeeded) but its HTTP endpoint
          # may still be warming up — wait for it to answer, mirroring the
          # HornDB leg. If it never becomes ready, skip the A/B leg rather
          # than failing the nightly.
          endpoint="${GRAPHDB_FREE_ENDPOINT:-http://127.0.0.1:7200/repositories/spb}"
          if ! ./crates/harness/scripts/wait-for-sparql.sh "$endpoint" 180; then
            echo "::warning::GraphDB Free not reachable at $endpoint — skipping A/B leg"
            exit 0
          fi
          ./crates/harness/scripts/run-graphdb-free-spb-256.sh

      - name: stop GraphDB engine
        if: always()
        run: pkill -f 'graphdb' 2>/dev/null || true

      - name: start Oxigraph engine
        id: start_oxigraph
        # Third A/B leg, mirroring the GraphDB one: bring the branch-pinned
        # Oxigraph up serving the same flat closure (loaded once by
        # bootstrap-oxigraph-spb.sh into the persisted store), then run the
        # driver. Runs only after both prior legs have stopped so it never
        # competes with them for RAM / OS page cache. continue-on-error keeps
        # the prior contract: an Oxigraph problem (e.g. store not yet
        # bootstrapped on the runner) skips this leg rather than failing the
        # nightly.
        continue-on-error: true
        run: ./crates/harness/scripts/start-oxigraph.sh

      - name: SPB-256 against Oxigraph
        if: steps.start_oxigraph.outcome == 'success'
        env:
          SPB_DRIVER_JAR: ${{ env.SPB_ASSETS }}/semantic_publishing_benchmark-basic-standard.jar
          SPB_SCENARIO: ${{ env.SPB_ASSETS }}/spb-nightly.properties
        run: |
          set -euo pipefail
          # start-oxigraph.sh already waited for readiness, but re-probe for
          # symmetry with the GraphDB leg; skip rather than fail if it dropped.
          if ! ./crates/harness/scripts/wait-for-sparql.sh "http://$OXIGRAPH_BIND/query" 60; then
            echo "::warning::Oxigraph not reachable at http://$OXIGRAPH_BIND/query — skipping A/B leg"
            exit 0
          fi
          ./crates/harness/scripts/run-oxigraph-spb-256.sh

      - name: stop Oxigraph engine
        if: always()
        # start-oxigraph.sh records the server PID (the binary is a versioned
        # name like `oxigraph-0.5.9`, so a `pkill -f 'oxigraph serve'` pattern
        # would miss it); a precise kill is safer on the shared bench runner.
        run: |
          if [ -f /tmp/oxigraph-engine.pid ]; then
            kill "$(cat /tmp/oxigraph-engine.pid)" 2>/dev/null || true
          fi

      - name: start Oxigraph engine (optimized store)
        id: start_oxigraph_optimized
        # Fourth A/B leg: the same Oxigraph binary serving the `oxigraph
        # optimize`d copy of the store (built once by
        # bootstrap-oxigraph-spb.sh). Its own leg and label so the optimized
        # and as-loaded configurations chart as separate trend series.
        continue-on-error: true
        run: OXIGRAPH_STORE="$HOME/oxigraph/spb-store-optimized" ./crates/harness/scripts/start-oxigraph.sh

      - name: SPB-256 against Oxigraph (optimized store)
        if: steps.start_oxigraph_optimized.outcome == 'success'
        env:
          SPB_DRIVER_JAR: ${{ env.SPB_ASSETS }}/semantic_publishing_benchmark-basic-standard.jar
          SPB_SCENARIO: ${{ env.SPB_ASSETS }}/spb-nightly.properties
        run: |
          set -euo pipefail
          if ! ./crates/harness/scripts/wait-for-sparql.sh "http://$OXIGRAPH_BIND/query" 60; then
            echo "::warning::Oxigraph (optimized) not reachable at http://$OXIGRAPH_BIND/query — skipping A/B leg"
            exit 0
          fi
          OXIGRAPH_LABEL=oxigraph-optimized ./crates/harness/scripts/run-oxigraph-spb-256.sh

      - name: stop Oxigraph engine (optimized store)
        if: always()
        run: |
          if [ -f /tmp/oxigraph-engine.pid ]; then
            kill "$(cat /tmp/oxigraph-engine.pid)" 2>/dev/null || true
          fi

      - name: prune trend DB to 90 days
        if: always()
        # Keep the cumulative DB (and the uploaded artifact) to a 90-day
        # rolling window; prune VACUUMs, so the file also shrinks.
        run: ./target/release/harness prune --keep-days 90

      - name: publish benchmark summary
        if: always()
        # Render the A/B snapshot table + a Mermaid `xychart-beta` trend
        # line into the job's step summary. Mermaid is the only one of
        # {raw SVG, data-URI <img>, mermaid} that survives GitHub's
        # markdown sanitiser, so it is how we embed the graph without an
        # uploaded asset. `always()` so the summary still publishes when
        # the A/B leg was skipped (GraphDB unreachable). The plain-text
        # dump still goes to the build log for quick eyeballing.
        run: |
          ./target/release/harness report --suite ldbc-spb-256 --metric aggregation-qps
          {
            ./target/release/harness report \
              --suite ldbc-spb-256 --metric aggregation-qps --format markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload sqlite
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harness-${{ github.run_id }}
          # The cumulative trend DB lives outside the checkout; upload that
          # (not target/harness.sqlite, which never gets written now that
          # $HARNESS_DB redirects every harness invocation).
          path: ${{ env.HARNESS_DB }}
